<style>

  }

  }

  /* ── MAP CONTAINER ── */
  #map-container {
    position: fixed;

  }

  #world-svg {
    width: 100%;
    height: 100%;
    opacity: 0.18;
  }

  /* ── DOTS ── */
  .avatar-dot {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
  }

  .dot-ring {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--bone);
    box-shadow: 0 0 0 0 rgba(240,236,228,0.6);
    animation: pulse 2.4s ease-out infinite;
    transition: transform 0.2s;
  }

  .avatar-dot:hover .dot-ring {
    transform: scale(1.5);
  }

  .avatar-dot.alive .dot-ring {
    background: var(--bone);
  }
  .avatar-dot.dead .dot-ring {
    background: var(--steel);
    animation: none;
    opacity: 0.4;
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0   rgba(240,236,228,0.5); }
    50%  { box-shadow: 0 0 0 10px rgba(240,236,228,0);   }
    100% { box-shadow: 0 0 0 0   rgba(240,236,228,0);    }
  }

  /* ── TOOLTIP ── */
  .tooltip {

    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--coal);
    border: 1px solid rgba(240,236,228,0.12);
    padding: 12px 18px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    min-width: 150px;
    text-align: center;
  }
  .avatar-dot:hover .tooltip { opacity: 1; }

  .tooltip-name {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--bone);

    color: var(--steel);

  .tooltip-status.dead  { color: var(--steel); opacity: 0.5; }

<script>

function cityToCoords(city) {
  const key = city.toLowerCase().trim();
  return CITY_COORDS[key] || null;
}

// ── CSV ПАРСЕР ──
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase());
  return lines.slice(1).map(line => {
    // Простой парсер (не обрабатывает запятые внутри кавычек — достаточно для наших данных)
    const vals = line.split(',').map(v => v.replace(/"/g, '').trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  });
}

// ── ЗАГРУЗКА ──
async function loadAvatars() {
  // Если URL не настроен — показываем заглушку
  if (SHEET_CSV_URL.includes('ТВОЙ_SHEET_ID')) {
    return [
      { name: 'Жегалкин Павел', city: 'Москва',           lat: 55.75, lng: 37.62, alive: 'TRUE',  activated: '27.05.2026' },
      { name: 'А.',             city: 'Санкт-Петербург',   lat: 59.93, lng: 30.32, alive: 'TRUE',  activated: '27.05.2026' },
      { name: 'M.',             city: 'Новосибирск',       lat: 54.99, lng: 82.90, alive: 'TRUE',  activated: '27.05.2026' },
    ];
  }
  try {
    const res  = await fetch(SHEET_CSV_URL);
    const text = await res.text();
    const rows = parseCSV(text);
    return rows.map(row => {
      const coords = cityToCoords(row['город'] || row['city'] || '');
      return {
        name:      row['имя'] || row['name'] || '—',
        city:      row['город'] || row['city'] || '—',
        lat:       coords ? coords.lat : parseFloat(row['lat']) || 55.75,
        lng:       coords ? coords.lng : parseFloat(row['lng']) || 37.62,
        alive:     (row['статус'] || row['alive'] || 'TRUE').toUpperCase() !== 'FALSE',
        activated: row['дата'] || row['timestamp'] || '—',
      };
    }).filter(r => r.name !== '—');
  } catch(e) {
    console.warn('Не удалось загрузить таблицу:', e);
    return [];
  }
}

// Перевод координат в % позицию на SVG viewBox 1000×500
// lng: -180..180 → 0..100%
// lat: 90..-90   → 0..100%
function latLngToPercent(lat, lng) {
  const x = ((lng + 180) / 360) * 100;
  const y = ((90 - lat) / 180) * 100;
  return { x, y };
}

const dotsLayer   = document.getElementById('dots-layer');
const panel       = document.getElementById('panel');
const panelClose  = document.getElementById('panel-close');
const panelName   = document.getElementById('panel-name');
const panelAvatar = document.getElementById('panel-avatar');
const panelBadge  = document.getElementById('panel-status-badge');
const panelStats  = document.getElementById('panel-stats');
const aliveCount  = document.getElementById('alive-count');

// День рождения — 2 июля
function checkBirthday() {
  const now = new Date();
  if (now.getMonth() === 6 && now.getDate() === 2) {
    document.getElementById('birthday-banner').classList.add('visible');
  }
}
checkBirthday();

function renderDots(avatars) {
  dotsLayer.innerHTML = '';
  const living = avatars.filter(a => a.alive === true || a.alive === 'TRUE').length;
  aliveCount.textContent = living;

  avatars.forEach(avatar => {
    const alive = avatar.alive === true || String(avatar.alive).toUpperCase() === 'TRUE';
    const pos   = latLngToPercent(avatar.lat, avatar.lng);

    const dot = document.createElement('div');
    dot.className = `avatar-dot ${alive ? 'alive' : 'dead'}`;
    dot.style.left = pos.x + '%';
    dot.style.top  = pos.y + '%';

    dot.innerHTML = `
      <div class="dot-ring"></div>
      <div class="tooltip">
        <span class="tooltip-name">${avatar.name}</span>
        <span class="tooltip-status ${alive ? 'alive' : 'dead'}">${alive ? 'жив' : 'мёртв'} · ${avatar.city}</span>
      </div>
    `;

    dot.addEventListener('click', () => openPanel({ ...avatar, alive }));
    dotsLayer.appendChild(dot);
  });
}

function openPanel(avatar) {
  panelName.textContent = avatar.name;
  panelAvatar.textContent = avatar.name[0];
  panelBadge.className = `panel-status-badge ${avatar.alive ? 'alive' : 'dead'}`;
  panelBadge.textContent = avatar.alive ? 'жив' : 'мёртв';

  const stats = [
    { label: 'Город',       value: avatar.city },
    { label: 'Активирован', value: avatar.activated },
  ];

  panelStats.innerHTML = stats.map(s => `
    <div class="panel-stat">
      <span class="panel-stat-label">${s.label}</span>
      <span class="panel-stat-value">${s.value}</span>
    </div>
  `).join('');

  panel.classList.add('open');
}
